# Champion + gender-invariant training recipe — the proper representation-level fix for the gender
# gap (DFR/head-only and gender_balanced-loss-only both failed; the shortcut is entangled in the
# encoder). Three coordinated levers:
#   (1) gender×occlusion balanced-batch SAMPLER — the encoder sees occluded males as often as
#       occluded females (builds gender-invariant occlusion features);
#   (2) metric-aligned LOSS — gender_balanced with gender_gap_lambda=1.0 = (Err_F+Err_M)/2+|gap|;
#   (3) gradient-reversal gender ADVERSARY (conditional on occ bin) — removes the residual gender
#       shortcut from the representation.
# Watch: train/loss_gadv should RISE and train/gadv_acc DROP toward the gender base rate as
# invariance kicks in. Gate vs the champion on val score AND the gap (+ rerun gender_gap_analysis.py
# to confirm beta(is_male)->0). seed 42.
project:
  name: face-occlusion-estimation
  seed: 42
  output_dir: outputs
  deterministic: false
experiment:
  name: cnx_ablation_10_gender_invariant
  output_root: outputs/experiments
  save_git_info: true
  save_config: true
  create_latest_pointer: true
data:
  train_csv: data/raw/occlusion_datasets/train.csv
  test_csv: data/raw/occlusion_datasets/test_students.csv
  image_root: data/raw/crops/Crop_224_5fp_100K
  image_col: filename
  target_col: FaceOcclusion
  gender_col: gender
  id_col: filename
  female_value: 0.0
  male_value: 1.0
  submission_dummy_gender: x
  target_scale: auto
  val_size: 0.2
  num_workers: 8
split:
  strategy: row_stratified
  occlusion_bins: [0.0, 0.05, 0.1, 0.2, 0.4, 0.6, 1.0]
  split_path: outputs/splits/canonical_row_split.csv
  val_size: 0.2
  random_state: 42
  stratify_by: [gender, occlusion_bin, database]
  group_col: group_id
  allow_missing_rows: false
model:
  backbone: convnext_small.fb_in22k_ft_in1k
  pretrained: true
  output_activation: identity
  dropout: 0.0
  use_ordinal_head: false
  use_gender_adversary: true
  gender_adversary: {hidden_dim: 128, conditional: true, dropout: 0.0}
losses:
  regression: {type: gender_balanced, gender_gap_lambda: 1.0, reweight: none}
  ordinal: {enabled: false}
  consistency: {enabled: false}
  monotonicity: {enabled: false}
  ranking: {enabled: false}
  triplet: {enabled: false}
  gender_adversary: {enabled: true, weight: 1.0, warmup_epochs: 3}
synthetic_occlusion: {enabled: false}
triplet_sampling: {enabled: false}
sampler:
  enabled: true
  strategy: gender_occlusion_balanced_batch
  bins: [0.0, 0.05, 0.1, 0.2, 0.4, 0.6, 1.0]
training:
  batch_size: 64
  max_epochs: 20
  learning_rate: 1.0e-4
  weight_decay: 0.03
  optimizer: adamw
  scheduler: cosine
  precision: 16-mixed
  float32_matmul_precision: high
  gradient_clip_val: 1.0
  early_stopping_patience: 5
augmentation:
  resize: 224
  horizontal_flip_p: 0.5
  color_jitter_p: 0.5
  brightness: 0.1
  contrast: 0.1
  saturation: 0.05
  rotation_degrees: 3
  background: {enabled: false}
inference:
  tta: false
checkpoint: {monitor: val/score, mode: min, save_top_k: 1, filename: best}
logging:
  use_wandb: false
  wandb_project: face-occlusion-estimation
  run_name: cnx_ablation_10_gender_invariant
  log_images: false
