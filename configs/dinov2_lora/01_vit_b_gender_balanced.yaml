# Representation-first pivot: DINOv2 ViT-B/14 fine-tuned with LoRA, a gender-balanced
# metric-weighted loss, regression head only, minimal label-preserving augmentation.
# Everything occlusion-aware (sampler / synthetic / reweight / ordinal / bg-aug) is OFF.
# Gate vs the ConvNeXt baseline with compare_experiments (paired-Δ + lenses + leakage-free).
project:
  name: face-occlusion-estimation
  seed: 42
  output_dir: outputs
  deterministic: false
experiment:
  name: dinov2_vit_b_lora_gender_balanced
  output_root: outputs/experiments
  save_git_info: true
  save_config: true
  create_latest_pointer: true
data:
  train_csv: data/raw/occlusion_datasets/train.csv
  test_csv: data/raw/occlusion_datasets/test_students.csv
  image_root: data/raw/crops/Crop_224_5fp_100K
  image_col: filename
  target_col: FaceOcclusion
  gender_col: gender
  id_col: filename
  female_value: 0.0
  male_value: 1.0
  submission_dummy_gender: 0
  target_scale: auto
  val_size: 0.2
  num_workers: 4
split:
  strategy: row_stratified
  occlusion_bins: [0.0, 0.05, 0.1, 0.2, 0.4, 0.6, 1.0]
  split_path: outputs/splits/canonical_row_split.csv
  val_size: 0.2
  random_state: 42
  stratify_by: [gender, occlusion_bin, database]
  group_col: group_id
  allow_missing_rows: false
model:
  backbone: vit_base_patch14_dinov2.lvd142m
  pretrained: true
  img_size: 224                 # ViT patch-14: 224 -> 16x16 grid (pos-embed interpolated)
  output_activation: identity
  dropout: 0.0
  use_ordinal_head: false
  use_projection_head: false
  lora:
    enabled: true
    rank: 16
    alpha: 32
    dropout: 0.05
    target_modules: [attn.qkv, attn.proj, mlp.fc1, mlp.fc2]
    modules_to_save: [head]
losses:
  regression:
    type: gender_balanced       # per-gender weighted MSE -> mean
    high_occ_power: 1.0         # 1.0 = exactly the metric weight (1/30 + y)
    gender_gap_lambda: 0.0      # >0 adds |Err_F - Err_M| to the loss
    reweight: none
  ordinal: {enabled: false}
  consistency: {enabled: false}
  monotonicity: {enabled: false}
  ranking: {enabled: false}
  triplet: {enabled: false}
synthetic_occlusion:
  enabled: false
triplet_sampling:
  enabled: false
training:
  batch_size: 64                # reduce if ViT-B activations OOM at 224
  max_epochs: 20
  learning_rate: 5.0e-4         # LoRA-appropriate (higher than full-FT); key knob to tune
  weight_decay: 0.01
  loss: weighted_mse
  optimizer: adamw
  scheduler: cosine
  precision: bf16-mixed         # Ada/Ampere/Hopper: same speed as fp16, no loss-scaling NaNs
  float32_matmul_precision: high
  gradient_clip_val: 1.0
  early_stopping_patience: 5
augmentation:
  resize: 224
  horizontal_flip_p: 0.5
  color_jitter_p: 0.5
  brightness: 0.10
  contrast: 0.10
  saturation: 0.05
  rotation_degrees: 0           # match the teammate's minimal aug
  background:
    enabled: false
logging:
  use_wandb: false
  wandb_project: face-occlusion-estimation
  run_name: dinov2_vit_b_lora_gender_balanced
  log_images: true
  log_prediction_plots: true
  log_images_every_n_epochs: 1
  num_logged_images: 16
sampler:
  enabled: false
checkpoint:
  monitor: val/score
  mode: min
  save_top_k: 1
  filename: best
