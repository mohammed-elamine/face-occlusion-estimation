# DINOv2 ViT-B reg + LoRA — FULL recipe, HIGHER LoRA CAPACITY (Exp C1).
# Identical to 02_vit_b_reg_lora_full.yaml EXCEPT the LoRA adapter: rank 16->32 and
# target_modules extended to the MLP blocks (mlp.fc1, mlp.fc2) in addition to attention.
# This is the cheap capacity test: does more adaptable parameter budget (still a frozen
# backbone) close the gap to the fully-fine-tuned ConvNeXt baseline (val 0.00129)?
# Compare vs 02_full (0.00146) and vs 06_full_finetune via compare_experiments.
project:
  name: face-occlusion-estimation
  seed: 42
  output_dir: outputs
  deterministic: false
experiment:
  name: dinov2_vitb_reg_lora_capacity
  output_root: outputs/experiments
  save_git_info: true
  save_config: true
  create_latest_pointer: true
data:
  train_csv: data/raw/occlusion_datasets/train.csv
  test_csv: data/raw/occlusion_datasets/test_students.csv
  image_root: data/raw/crops/Crop_224_5fp_100K
  image_col: filename
  target_col: FaceOcclusion
  gender_col: gender
  id_col: filename
  female_value: 0.0
  male_value: 1.0
  submission_dummy_gender: 0
  target_scale: auto
  val_size: 0.2
  num_workers: 8
split:
  strategy: row_stratified
  occlusion_bins: [0.0, 0.05, 0.1, 0.2, 0.4, 0.6, 1.0]
  split_path: outputs/splits/canonical_row_split.csv
  val_size: 0.2
  random_state: 42
  stratify_by: [gender, occlusion_bin, database]
  group_col: group_id
  allow_missing_rows: false
model:
  backbone: vit_base_patch14_reg4_dinov2.lvd142m
  pretrained: true
  img_size: 224
  output_activation: sigmoid
  dropout: 0.0
  use_ordinal_head: false
  head:
    type: mlp
    hidden_dim: 256
    dropout: 0.2
  lora:
    enabled: true
    rank: 32                                   # was 16: more adapter capacity
    alpha: 64                                   # keep alpha/rank = 2 (same scaling as 02_full)
    dropout: 0.05
    target_modules: [attn.qkv, attn.proj, mlp.fc1, mlp.fc2]   # +MLP blocks (was attention only)
losses:
  regression:
    type: gender_balanced
    reweight: none
  ordinal: {enabled: false}
  consistency: {enabled: false}
  monotonicity: {enabled: false}
  ranking: {enabled: false}
  triplet: {enabled: false}
synthetic_occlusion:
  enabled: false
triplet_sampling:
  enabled: false
training:
  batch_size: 64
  max_epochs: 20
  learning_rate: 2.0e-4
  head_lr: 1.0e-3
  backbone_lr: 2.0e-4
  weight_decay: 1.0e-4
  warmup_frac: 0.05
  optimizer: adamw
  scheduler: cosine
  precision: bf16-mixed
  float32_matmul_precision: high
  gradient_clip_val: 0.0
  early_stopping_patience: 5
augmentation:
  resize: 224
  horizontal_flip_p: 0.5
  color_jitter_p: 1.0
  brightness: 0.2
  contrast: 0.2
  saturation: 0.2
  hue: 0.05
  rotation_degrees: 0
  background:
    enabled: false
inference:
  tta: true
logging:
  use_wandb: false
  wandb_project: face-occlusion-estimation
  run_name: dinov2_vitb_reg_lora_capacity
  log_images: false
  log_prediction_plots: true
  log_images_every_n_epochs: 1
  num_logged_images: 16
sampler:
  enabled: true
  strategy: gender_occlusion_balanced_batch
  target: bin_weights
  balance_strength: 0.3
  drop_last: true
checkpoint:
  monitor: val/score
  mode: min
  save_top_k: 1
  filename: best
