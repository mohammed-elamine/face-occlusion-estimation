# Imbalanced-regression group — balanced batch SAMPLER (independent lever; reweight OFF).
# 00_baseline + the gender x occlusion sampler targeting the BALANCED distribution (the
# same operator as the eval lenses). drop_last: true keeps it ablation-equivalent to the
# baseline. Gate vs 00_baseline with paired-Δ + lenses, and WATCH the leakage-free score
# (the memorization check, since the sampler repeats the rare tail images).
project:
  name: face-occlusion-estimation
  seed: 42
  output_dir: outputs
  deterministic: false
experiment:
  name: imbreg_03_sampler_balanced
  output_root: outputs/experiments
  save_git_info: true
  save_config: true
  create_latest_pointer: true
data:
  train_csv: data/raw/occlusion_datasets/train.csv
  test_csv: data/raw/occlusion_datasets/test_students.csv
  image_root: data/raw/crops/Crop_224_5fp_100K
  image_col: filename
  target_col: FaceOcclusion
  gender_col: gender
  id_col: filename
  female_value: 0.0
  male_value: 1.0
  submission_dummy_gender: x
  target_scale: auto
  val_size: 0.2
  num_workers: 4
split:
  strategy: row_stratified
  occlusion_bins: [0.0, 0.05, 0.1, 0.2, 0.4, 0.6, 1.0]
  split_path: outputs/splits/canonical_row_split.csv
  val_size: 0.2
  random_state: 42
  stratify_by: [gender, occlusion_bin, database]
  group_col: group_id
  allow_missing_rows: false
model:
  backbone: convnext_small.fb_in22k_ft_in1k
  pretrained: true
  output_activation: identity
  dropout: 0.0
  use_ordinal_head: false
  use_projection_head: false
  ordinal_thresholds: [0.05, 0.1, 0.2, 0.4, 0.6]
losses:
  regression:
    reweight: none        # none | balanced | test_matched
    weight: 1.0
    warmup_epochs: 0
    warmup_start_weight: 0.0
    clip_max: 10.0
  ordinal:
    enabled: false
    weight: 0.2
    warmup_epochs: 0
    warmup_start_weight: 0.0
    threshold_weights: [1.0, 1.0, 1.2, 2.0, 3.0]
  consistency:
    enabled: false
    weight: 0.05
    warmup_epochs: 0
    warmup_start_weight: 0.0
    temperature: 0.05
    mode: symmetric
  monotonicity:
    enabled: false
    weight: 0.01
    warmup_epochs: 0
    warmup_start_weight: 0.0
  ranking:
    enabled: false
    weight: 0.1
    warmup_epochs: 2
    warmup_start_weight: 0.0
  triplet:
    enabled: false
synthetic_occlusion:
  enabled: false
  return_in_batch: false
  use_cache: true
  cache_dir: data/synthetic_cache/v1
triplet_sampling:
  enabled: false
training:
  batch_size: 64
  max_epochs: 20
  learning_rate: 7.5e-05
  weight_decay: 0.03
  loss: weighted_mse
  optimizer: adamw
  scheduler: cosine
  precision: 16-mixed
  float32_matmul_precision: high
  gradient_clip_val: 1.0
  early_stopping_patience: 5
augmentation:
  resize: 224
  horizontal_flip_p: 0.5
  color_jitter_p: 0.5
  brightness: 0.1
  contrast: 0.1
  saturation: 0.05
  rotation_degrees: 3
  background:
    enabled: false
logging:
  use_wandb: false
  wandb_project: face-occlusion-estimation
  run_name: imbreg_03_sampler_balanced
  log_images: true
  log_prediction_plots: true
  log_images_every_n_epochs: 1
  num_logged_images: 16
sampler:
  enabled: true
  strategy: gender_occlusion_balanced_batch
  target: balanced        # bin_weights | balanced | test_matched
  balance_strength: 0.3
  gender_balance_strength: 0.5
  max_stratum_weight: 8.0
  min_stratum_size: 5
  size_aware_weighting: true
  reliable_stratum_size: 20
  max_repeats_per_image: 10
  clip_max: 10.0
  drop_last: true
  seed: 42
checkpoint:
  monitor: val/score
  mode: min
  save_top_k: 1
  filename: best
